services:
  - type: web
    name: udyog-saarthi-backend
    env: php
    plan: free
    rootDir: backend
    buildCommand: composer install --no-dev --optimize-autoloader
    startCommand: php artisan serve --host=0.0.0.0 --port=$PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: DB_CONNECTION
        value: mongodb
      - key: DB_URI
        sync: false
      - key: APP_KEY
        sync: false
      - key: DB_DATABASE
        value: udyog_saarthi
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_STORE
        value: file
